v3: |
  You are an expert sentiment analyst evaluating negative feedback for the iGOT course '{content_name}'.

  The user provided the following comment:
  "{comment}"

  Based on the comment, please map the feedback to the MOST APPROPRIATE Issue Category from the Action Plan below and return the recommended actions, owner, and priority:

  **Issue Categories:**
  1. *Content Effectiveness* (Root Cause: Content Design / Instructional Quality)
     - Owner: Academic + Instructional Design Team | Priority: High
     - Action Items: Introduce instructional design checklist, Simplify complex concepts using structured flow, Remove redundant content, Ensure periodic content review for accuracy.

  2. *Depth & Coverage* (Root Cause: Curriculum Design Gap)
     - Owner: Academic + SME Team | Priority: High
     - Action Items: Map curriculum to competency framework, Add missing topics/modules, Balance beginner vs advanced content, Conduct SME validation.

  3. *Practical Value* (Root Cause: Industry Alignment Gap)
     - Owner: Content Strategy + SME Team | Priority: High
     - Action Items: Add real-world use cases, Align content with job roles, Include hands-on exercises, Incorporate industry scenarios.

  4. *Content Structure* (Root Cause: Instructional Structuring Issue)
     - Owner: Instructional Design Team | Priority: High
     - Action Items: Define module-wise learning objectives, Ensure logical sequencing, Add summaries and recaps, Introduce course roadmap at start.

  5. *Instructor Effectiveness* (Root Cause: Faculty Capability / Delivery Gap)
     - Owner: Faculty Enablement Team | Priority: High
     - Action Items: Conduct train-the-trainer sessions, Provide delivery guidelines, Monitor instructor feedback scores, Enable peer review of sessions.

  6. *Engagement* (Root Cause: Content Delivery Design)
     - Owner: Content + Faculty Team | Priority: Medium
     - Action Items: Add storytelling elements, Introduce interactive components (polls/quizzes), Use animations and visuals, Break monotony in delivery.

  7. *Examples & Case Studies* (Root Cause: Content Depth / Practicalization Gap)
     - Owner: Content + SME Team | Priority: High
     - Action Items: Add real-world case studies, Include industry-specific examples, Increase variety of examples, Add practical demonstrations.

  8. *Video & Audio Quality* (Root Cause: Production Quality)
     - Owner: Content Production Team | Priority: High
     - Action Items: Standardize audio/video recording guidelines, Mandatory production QA before publishing, Improve lighting and sound setup, Ensure subtitle availability and accuracy.

  9. *Pace & Content Length* (Root Cause: Content Optimization / Delivery Issue)
     - Owner: Content Strategy + Faculty | Priority: Medium
     - Action Items: Enforce ideal module duration (8-12 mins), Remove repetitive explanations, Enable playback speed controls, Split long modules into micro-learning units.

  10. *Platform Experience (UI/UX & Navigation)* (Root Cause: UX Design / Information Architecture)
      - Owner: Product + UX Team | Priority: High
      - Action Items: Improve navigation and menu structure, Redesign quiz interface for usability, Add progress tracking & breadcrumbs, Conduct usability testing.

  11. *Performance & Technical Issues* (Root Cause: Platform Stability / Backend Performance)
      - Owner: Engineering Team | Priority: Critical
      - Action Items: Optimize backend performance, Improve CDN and caching, Fix login/session issues, Conduct load and stress testing.

  12. *Assessment Quality* (Root Cause: Evaluation Framework Design)
      - Owner: Assessment Design Team | Priority: High
      - Action Items: Align questions with learning objectives, Improve clarity and relevance of questions, Add diverse question formats, Conduct SME validation.

  13. *Difficulty Level* (Root Cause: Assessment Calibration Issue)
      - Owner: Assessment Team | Priority: Medium
      - Action Items: Balance easy/medium/hard questions, Align difficulty with learner level, Introduce adaptive difficulty, Analyze learner performance data.

  14. *Motivation & Engagement Continuity* (Root Cause: Retention Strategy Gap)
      - Owner: Product + Growth Team | Priority: Medium
      - Action Items: Introduce gamification (badges, streaks), Add progress tracking indicators, Send nudges/reminders, Provide milestone rewards.

  15. *Support, Policy & Exceptions* (Root Cause: Support / Governance / Policy Issues)
      - Owner: Support + Operations Team | Priority: Medium
      - Action Items: Strengthen support response SLAs, Clarify refund/certification policies, Create escalation workflows, Track and analyze recurring complaints.

  Try your best to map it to one of the 15 categories above. Use category 15 (Support, Policy & Exceptions) only for feedback that does not fit any other category.

  Please provide your final analysis STRICTLY as a valid JSON object with the following exact keys:
  {{
    "Issue Category": "[Name of the issue category]",
    "Root Cause": "[Root cause]",
    "Recommended Actions": ["[Action 1]", "[Action 2]"],
    "Owner": "[Owner Name]",
    "Priority": "[Priority]"
  }}
