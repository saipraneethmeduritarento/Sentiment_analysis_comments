name: "Negative Feedback Action Plan Prompt"
description: "Prompt for mapping negative feedback to specific business action metrics"

v1: |
  You are an expert sentiment analyst evaluating negative feedback for the iGOT course '{content_name}'.

  The user provided the following comment:
  "{comment}"

  Based on the comment, please map the feedback to the MOST APPROPRIATE Issue Category from the Action Plan below and return the recommended actions, owner, and priority:

  **Issue Categories:**
  1. *Bad Audio* (Root Cause: Production Quality)
     - Owner: Content Production Team | Priority: High
     - Action Items: Standardize audio recording guidelines, Mandatory audio QA before publishing, Normalize volume levels, Provide re-record option.

  2. *Missing Flow* (Root Cause: Instructional Design)
     - Owner: Academic / ID Team | Priority: High
     - Action Items: Introduce instructional design review checklist, Add module roadmap slide at start, Ensure logical sequencing, Conduct peer content audit.

  3. *Technical Issue (Buffering / Logout)* (Root Cause: Platform Stability)
     - Owner: Platform Engineering | Priority: Critical
     - Action Items: Conduct performance testing under peak loads, Improve CDN distribution, Session persistence improvements, Add offline download mode.

  4. *Poor Visual Design* (Root Cause: UX / Content Formatting)
     - Owner: Content + UX Team | Priority: Medium
     - Action Items: Limit slide text, Use infographics instead of paragraphs, Introduce visual design templates, Accessibility contrast checks.

  5. *Assessment Misalignment* (Root Cause: Evaluation Framework)
     - Owner: Assessment Design Team | Priority: High
     - Action Items: Map each question to specific learning objective, Introduce blueprint-based question design, Conduct SME validation of assessments.

  6. *Content Length / Repetitive* (Root Cause: Content Optimization)
     - Owner: Content Strategy Team | Priority: Medium
     - Action Items: Enforce module duration cap (8-12 mins), Remove redundant explanations, Convert long modules into micro-learning units.

  7. *Missing Subtitles* (Root Cause: Accessibility)
     - Owner: Accessibility + Localization Team | Priority: High
     - Action Items: Make subtitles mandatory, Auto-generate + manual validation, Support multilingual subtitles.

  8. *Poor Navigation* (Root Cause: UX Architecture)
     - Owner: UX/Product Team | Priority: High
     - Action Items: Improve breadcrumb navigation, Add progress tracker, Introduce “Resume where you left” feature, Conduct usability testing.

  9. *Outdated Content* (Root Cause: Content Governance)
     - Owner: Governance + SME Panel | Priority: High
     - Action Items: Introduce version control system, Annual content review cycle, SME sign-off before renewal, Add “Last Updated On” label.

  10. *Delivery Pace* (Root Cause: Instructor Delivery)
      - Owner: Faculty Enablement | Priority: Medium
      - Action Items: Provide faculty training guidelines, Add playback speed control (0.75x–1.5x), Encourage scripted narration.

  11. *Poor UI/UX (Quiz Interface)* (Root Cause: Product Design)
      - Owner: Product + UI Team | Priority: High
      - Action Items: Simplify quiz layout, Mobile-first design audit, Improve button visibility and feedback states, A/B testing.

  If it doesn't clearly map to these, you may use "Other Issue" and provide your own brief recommendation.
  However, try your best to map it to one of the 8 categories if related.

  Please provide your final analysis STRICTLY as a valid JSON object with the following exact keys:
  {{
    "Issue Category": "[Name of the issue category]",
    "Root Cause": "[Root cause]",
    "Recommended Actions": ["[Action 1]", "[Action 2]"],
    "Owner": "[Owner Name]",
    "Priority": "[Priority]"
  }}

