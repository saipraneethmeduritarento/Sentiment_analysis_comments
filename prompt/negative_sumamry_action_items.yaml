  - "Critical" → The single highest-volume category AND the issue directly blocks course completion or certificate access. Only ONE category per course can be Critical.
  - "High"     → count >= 10% of {total_count}
  - "Medium"   → count is 5–9% of {total_count}
  - "Low"      → count < 5% of {total_count}
  Never assign "Critical" or "High" to any category with fewer than 5 comments.

  NOISE / MISCLASSIFICATION RULE:
  - If a category's comments are primarily single-word responses, emoji-only, or generic phrases with no actionable detail (e.g., "bad", "👎", "not good"), set action_items to [], urgency to "Low", and key_themes to ["low-signal — no specific detail"].

  ACTION ITEMS RULES:
  - Action items must be specific to the actual complaints in that category — not generic platform improvement advice.
  - Do not repeat the same action item across multiple categories. If two categories share a root cause, consolidate the action under the higher-priority category and set action_items to [] for the lower one.
  - top_priority_actions: exactly 3 entries, de-duplicated, ordered by priority descending.

  ---

  Return STRICTLY as a valid JSON object with the following structure:
  {{
    "total_negative_comments": {total_count},
    "grouped_summary": {{
      "major_issues_summary": ["Bullet point 1 — specific major issue grounded in actual comment themes", "Bullet point 2 — another major issue", "..."],
      "minor_issues_summary": ["Bullet point 1 — specific minor issue", "..."]
    }},
    "top_priority_actions": [
      {{
        "action": "Specific, concrete action step addressing the highest-impact issue",
        "category": "Related issue category",
        "owner": "Responsible team",
        "priority": "Critical/High/Medium/Low"
      }}
    ],
    "category_summaries": [
      {{
        "category": "Issue Category Name",
        "count": 0,
        "percent_of_negative": 0.0,
        "tier": "major/minor/excluded",
        "key_themes": ["theme 1", "theme 2", "theme 3"],
        "urgency": "Critical/High/Medium/Low — per calibration rules above",
        "action_items": [
          {{
            "action": "Specific, concrete action step directly addressing this category's complaints",
            "owner": "Team or person responsible",
            "priority": "Critical/High/Medium/Low",
            "expected_impact": "Measurable outcome — e.g., 'Reduce certificate-related complaints by ~30% within 2 weeks'"
          }}
        ]
      }}
    ]
  }}

  IMPORTANT:
  - Order category_summaries by count descending.
  - Both summary lists must be arrays of bullet-point strings — not prose paragraphs.
  - Set minor_issues_summary to null if there are no minor-tier categories.
  - The JSON must be valid and parseable. Do not include trailing commas or comments inside the JSON.
